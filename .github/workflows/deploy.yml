name: deploy
concurrency:
  group: "deploy-${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}"
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Run tests only (no deploy)'
        required: false
        default: 'false'
      deploymentName:
        description: 'Deployment name (ci for shared CI, or custom name)'
        required: false
        default: ''
      loadTestDuration:
        description: 'Duration for load test (e.g. 120s, 10m, 1h)'
        required: false
        default: '120s'
      loadTestProfile:
        description: 'Profile for load test (e.g. peek)'
        required: false
        type: choice
        options:
          - peek
          - flat
        default: 'peek'

  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - '.github/workflows/deploy.yml'
      - 'app/**'
      - 'infra/**'
      - 'tests/**'
      - 'web/**'
      - 'well-known/**'
      - '.env.ci'
      - '.env.prod'
      - 'cdk.json'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'pom.xml'
  schedule:
    - cron: '23 4 * * *'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1

jobs:

  names:
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute deployment name and environment
        id: deployment-config
        run: |
          REF_NAME="${{ github.ref_name }}"
          INPUT_DEPLOYMENT_NAME="${{ inputs.deploymentName }}"

          # Clean branch name: lowercase, replace non-alphanumeric with hyphens, collapse consecutive hyphens
          CLEANED=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9]/-/g' -e 's/-\{2,\}/-/g' -e 's/^-//' -e 's/-$//')

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              ENV_NAME="prod"
              DEPLOYMENT_NAME="prod"
          elif [ "$INPUT_DEPLOYMENT_NAME" = "ci" ]; then
              ENV_NAME="ci"
              DEPLOYMENT_NAME="ci"
          elif [ -n "$INPUT_DEPLOYMENT_NAME" ]; then
              ENV_NAME="ci"
              DEPLOYMENT_NAME="$INPUT_DEPLOYMENT_NAME"
          else
              ENV_NAME="ci"
              # Truncate to 16 chars for branch-based deployments
              DEPLOYMENT_NAME="ci-${CLEANED:0:16}"
          fi

          echo "ENV_NAME=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "Computed ENV_NAME: $ENV_NAME"
          echo "Computed DEPLOYMENT_NAME: $DEPLOYMENT_NAME"
    outputs:
      environment-name: ${{ steps.deployment-config.outputs.ENV_NAME }}
      deployment-name: ${{ steps.deployment-config.outputs.DEPLOYMENT_NAME }}

  npm-test:
    name: 'npm test'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - run: npm test

  mvn-test:
    name: 'maven test'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: mvn package
        id: package
        shell: bash
        run: ./mvnw clean package

  docker-build:
    name: 'docker build'
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          docker buildx build \
            --load \
            -f Dockerfile .

  npm-test-cdk:
    name: 'npm test cdk'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: test:cdk
        id: test-cdk
        shell: bash
        run: npm run cdk

  build-cdk:
    name: 'build cdk'
    needs:
      - names
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Build CDK and synthesize all stacks
        run: |
          ./mvnw --errors clean package -DskipTests \
            && npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
              npx cdk synth --all --strict --validation --version-reporting=false --path-metadata=false --asset-metadata=false
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

      - name: Upload CDK synthesis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cdk-synthesis
          path: cdk.out/
          retention-days: 1

  diff-cdk:
    name: 'diff cdk'
    needs:
      - names
      - npm-test
      - build-cdk
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Diff stacks (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk diff --all \
              --ci true \
          ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}
          BASE_IMAGE_TAG: ${{ needs.build-images.outputs.image-tag }}

  deploy-observability:
    name: 'deploy observability'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - npm-test
      - build-cdk
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      # Once only per account
      #- name: Bootstrap CDK
      #  run: npx cdk bootstrap
      #  env:
      #    CDK_NEW_BOOTSTRAP: '1'

      - name: Deploy Observability Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk deploy ${{ needs.names.outputs.deployment-name }}-ObservabilityStack \
              --require-approval never \
              --ci true \
              --outputs-file cdk.out/cdk-outputs-observability.json \
          ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

  deploy-dev:
    name: 'deploy dev'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - npm-test
      - build-cdk
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Deploy Dev Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk deploy ${{ needs.names.outputs.deployment-name }}-DevStack \
              --require-approval never \
              --ci true \
              --outputs-file cdk.out/cdk-outputs-dev.json \
          ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

      - name: Resolve stack outputs
        id: dev-outputs
        shell: bash
        run: |
          ECR_REPOSITORY_URI=$(jq -r '.["${{ needs.names.outputs.deployment-name }}-DevStack"].EcrRepositoryUri' cdk.out/cdk-outputs-dev.json)
          echo "ECR_REPOSITORY_URI=$ECR_REPOSITORY_URI"
          echo "ECR_REPOSITORY_URI=$ECR_REPOSITORY_URI" >> $GITHUB_OUTPUT
    outputs:
      ecr-repository-uri: ${{ steps.dev-outputs.outputs.ECR_REPOSITORY_URI }}

  build-images:
    name: 'build and push images'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - build-cdk
      - deploy-dev
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            docker buildx build \
              --load \
              -t 'oidc-endpoint-function:${{ github.sha }}' \
              -f Dockerfile .
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Login to Amazon ECR
        shell: bash
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ needs.deploy-dev.outputs.ecr-repository-uri }}

      - name: Tag and push Docker image to ECR
        shell: bash
        run: |
          docker tag 'oidc-endpoint-function:${{ github.sha }}' ${{ needs.deploy-dev.outputs.ecr-repository-uri }}:${{ github.sha }}
          docker tag 'oidc-endpoint-function:${{ github.sha }}' ${{ needs.deploy-dev.outputs.ecr-repository-uri }}:latest
          docker push ${{ needs.deploy-dev.outputs.ecr-repository-uri }}:${{ github.sha }}
          docker push ${{ needs.deploy-dev.outputs.ecr-repository-uri }}:latest
    outputs:
      ecr-repository-uri: ${{ needs.deploy-dev.outputs.ecr-repository-uri }}
      image-tag: ${{ github.sha }}

  deploy-app:
    name: 'deploy app'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - npm-test
      - build-cdk
      - deploy-dev
      - build-images
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Deploy App stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk deploy ${{ needs.names.outputs.deployment-name }}-AppStack \
              --exclusively \
              --require-approval never \
              --ci true \
              --outputs-file cdk.out/cdk-outputs-app.json \
            ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}
          BASE_IMAGE_TAG: ${{ needs.build-images.outputs.image-tag }}

      - name: Resolve stack outputs
        id: app-outputs
        run: |
          USERS_TABLE=$(jq -r '.["${{ needs.names.outputs.deployment-name }}-AppStack"].UsersTableName' cdk.out/cdk-outputs-app.json)
          echo "USERS_TABLE=$USERS_TABLE"
          echo "USERS_TABLE=$USERS_TABLE" >> $GITHUB_OUTPUT
        shell: bash
    outputs:
      users-table: ${{ steps.app-outputs.outputs.USERS_TABLE }}

  deploy-web:
    name: 'deploy web'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - npm-test
      - build-cdk
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Deploy Web Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk deploy ${{ needs.names.outputs.deployment-name }}-WebStack \
              --exclusively \
              --require-approval never \
              --ci true \
              --outputs-file cdk.out/cdk-outputs-web.json \
            ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

  deploy-edge:
    name: 'deploy edge'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - npm-test
      - build-cdk
      - deploy-app
      - deploy-web
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Deploy Edge Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk deploy ${{ needs.names.outputs.deployment-name }}-EdgeStack \
              --exclusively \
              --require-approval never \
              --ci true \
              --outputs-file cdk.out/cdk-outputs-edge.json \
            ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

      - name: Resolve stack outputs
        id: edge-outputs
        run: |
          BASE_URL=$(jq -r '.["${{ needs.names.outputs.deployment-name }}-EdgeStack"].BaseUrl' cdk.out/cdk-outputs-edge.json)
          echo "BASE_URL=$BASE_URL"
          echo "BASE_URL=$BASE_URL" >> $GITHUB_OUTPUT
        shell: bash
    outputs:
      base-url: ${{ steps.edge-outputs.outputs.BASE_URL }}

  deploy-ops:
    name: 'deploy ops'
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - npm-test
      - build-cdk
      - deploy-app
      - deploy-web
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Download CDK synthesis artifacts
        uses: actions/download-artifact@v5
        with:
          name: cdk-synthesis
          path: cdk.out/

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Deploy Ops Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- \
            npx cdk deploy ${{ needs.names.outputs.deployment-name }}-OpsStack \
              --exclusively \
              --require-approval never \
              --ci true \
              --outputs-file cdk.out/cdk-outputs-ops.json \
            ;
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

  calculate-test-parameters:
    if: ${{ !cancelled() && inputs.skipDeploy == 'true' || needs.deploy-edge.result == 'success' }}
    name: 'calculate test parameters'
    needs:
      - names
      - build-cdk
      - deploy-app
      - deploy-edge
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    env:
      USERS_TABLE: ${{ needs.deploy-app.outputs.users-table || format('oidc-antonycc-com-{0}-users', needs.names.outputs.deployment-name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Create test username and a test password
        id: uuid
        run: |
          TEST_USERNAME=$(uuidgen | tr '[:upper:]' '[:lower:]')
          TEST_PASSWORD=$(uuidgen | tr '[:upper:]' '[:lower:]')
          echo "TEST_USERNAME=${TEST_USERNAME?}"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}"
          echo "TEST_USERNAME=${TEST_USERNAME?}" >> "$GITHUB_OUTPUT"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - name: Provision test user
        run: npm run users:provision '${{ env.USERS_TABLE }}' '${{ steps.uuid.outputs.TEST_USERNAME }}' '${{ steps.uuid.outputs.TEST_PASSWORD }}'

    outputs:
      base-url: ${{ needs.deploy-edge.outputs.base-url || ( needs.names.outputs.deployment-name == 'prod' && 'oidc.antonycc.com' || format('{0}.oidc.antonycc.com', needs.names.outputs.deployment-name) ) }}
      test-username: ${{ steps.uuid.outputs.TEST_USERNAME }}
      test-password: ${{ steps.uuid.outputs.TEST_PASSWORD }}

  api-test:
    if: ${{ !cancelled() && inputs.skipDeploy == 'true' || needs.deploy-edge.result == 'success' }}
    name: 'api test'
    needs:
      - names
      - build-cdk
      - deploy-edge
      - calculate-test-parameters
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - name: Install dependencies and Playwright browsers
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Run Playwright API test
        run: |
          echo "BASE_URL=${BASE_URL}"
          npm run test:api
        env:
          BASE_URL: ${{ needs.calculate-test-parameters.outputs.base-url }}
          TEST_USERNAME: ${{ needs.calculate-test-parameters.outputs.test-username }}
          TEST_PASSWORD: ${{ needs.calculate-test-parameters.outputs.test-password }}

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            playwright-report
            test-results

  web-test:
    if: ${{ !cancelled() && inputs.skipDeploy == 'true' || needs.deploy-edge.result == 'success' }}
    name: 'web test'
    needs:
      - names
      - build-cdk
      - deploy-edge
      - calculate-test-parameters
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - name: Install dependencies and Playwright browsers
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Run Playwright behaviour tests
        run: |
          npm run test:web --project=chromium
        env:
          BASE_URL: ${{ needs.calculate-test-parameters.outputs.base-url }}
          TEST_USERNAME: ${{ needs.calculate-test-parameters.outputs.test-username }}
          TEST_PASSWORD: ${{ needs.calculate-test-parameters.outputs.test-password }}

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: web-test-artifacts
          path: |
            playwright-report
            test-results

  load-test:
    if: ${{ !cancelled() && inputs.skipDeploy == 'true' || needs.deploy-edge.result == 'success' }}
    name: 'load test'
    needs:
      - names
      - build-cdk
      - deploy-edge
      - calculate-test-parameters
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Setup k6 with dashboard extension
        run: |
          # Download pre-built k6 binary with xk6-dashboard extension
          curl -L https://github.com/grafana/xk6-dashboard/releases/download/v0.7.12/xk6-dashboard_v0.7.12_linux_amd64.tar.gz -o xk6-dashboard.tar.gz
          tar -xzf xk6-dashboard.tar.gz
          chmod +x xk6-dashboard_v0.7.12_linux_amd64/k6
          # Create a symlink for easy access
          ln -s xk6-dashboard_v0.7.12_linux_amd64/k6 k6
          ./k6 version

      - name: Run k6 load test with dashboard
        run: |
          # k6 run tests/load.live.test.js --summary-export=load-test-summary.json
          # Run k6 with dashboard export, events recording, and summary export for maximum information
          ./k6 run tests/load.live.test.js \
            --out 'dashboard=export=load-test-report.html&port=-1&record=load-test-events.json&period=1s' \
            --summary-export=load-test-summary.json
        env:
          BASE_URL: ${{ needs.calculate-test-parameters.outputs.base-url }}
          TEST_USERNAME: ${{ needs.calculate-test-parameters.outputs.test-username }}
          TEST_PASSWORD: ${{ needs.calculate-test-parameters.outputs.test-password }}
          DURATION: ${{ inputs.loadTestDuration }}
          PROFILE: ${{ inputs.loadTestProfile }}

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: load-test-artifacts
          path: |
            load-test-summary.json
            load-test-report.html
            load-test-events.json
