name: Deploy OIDC + Test

on:
  workflow_dispatch:
    inputs:
      testOnly:
        description: 'Run tests only (no deploy)'
        required: false
        default: 'false'
      baseUrl:
        description: 'Existing deployed BASE_URL for testOnly runs (e.g. https://oidc.antonycc.com)'
        required: false
        default: ''
  push:
    branches:
      - '**'
      - '!gh_pages'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  ENV_NAME: prod
  HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
  HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
  DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
  CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}
  COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}

jobs:
  build-deploy-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node test
        run: npm ci && npm test

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure AWS creds via OIDC
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package

      # Once only per account
      #- name: Bootstrap CDK
      #  if: ${{ inputs.testOnly != 'true' }}
      #  run: npx cdk bootstrap
      #  env:
      #    CDK_NEW_BOOTSTRAP: '1'

      # Only deploy from main
      - name: Deploy OIDC Provider Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          export ENV_NAME=${{ env.ENV_NAME }}
          export HOSTED_ZONE_NAME=${{ env.HOSTED_ZONE_NAME }}
          export HOSTED_ZONE_ID=${{ env.HOSTED_ZONE_ID }}
          export DOMAIN_NAME=${{ env.DOMAIN_NAME }}
          export CERTIFICATE_ARN=${{ env.CERTIFICATE_ARN }}
          export COGNITO_DOMAIN_PREFIX=${{ env.COGNITO_DOMAIN_PREFIX }}
          npx cdk deploy OidcProviderStack-${ENV_NAME} --require-approval never --outputs-file cdk.out/cdk-outputs-oidc-provider.json

      - name: Deploy Cognito Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          export ENV_NAME=${{ env.ENV_NAME }}
          export HOSTED_ZONE_NAME=${{ env.HOSTED_ZONE_NAME }}
          export HOSTED_ZONE_ID=${{ env.HOSTED_ZONE_ID }}
          export DOMAIN_NAME=${{ env.DOMAIN_NAME }}
          export CERTIFICATE_ARN=${{ env.CERTIFICATE_ARN }}
          export COGNITO_DOMAIN_PREFIX=${{ env.COGNITO_DOMAIN_PREFIX }}
          npx cdk deploy CognitoStack-${ENV_NAME} --exclusively --require-approval never --outputs-file cdk.out/cdk-outputs-cognito.json

      - name: Resolve BASE_URL and Cognito outputs
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: out
        run: |
          ENV_NAME='${{ env.ENV_NAME }}'
          BASE=$(jq -r '.["OidcProviderStack-'${ENV_NAME}'"].BaseUrl' cdk.out/cdk-outputs-oidc-provider.json)
          COGD=$(jq -r '.["CognitoStack-'${ENV_NAME}'"].CognitoAuthDomain' cdk.out/cdk-outputs-cognito.json)
          CLID=$(jq -r '.["CognitoStack-'${ENV_NAME}'"].UserPoolClientId' cdk.out/cdk-outputs-cognito.json)
          echo "BASE_URL=$BASE" >> $GITHUB_OUTPUT
          echo "COGNITO_DOMAIN=$COGD" >> $GITHUB_OUTPUT
          echo "COGNITO_CLIENT_ID=$CLID" >> $GITHUB_OUTPUT
        shell: bash

      - name: Provision test user
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: npm run provision:user test-user Passw0rd!
        env:
          USERS_TABLE: ${{ env.USERS_TABLE }}

      - name: Install dependencies and Playwright browsers
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install --with-deps

      # The behaviour tests are not run for testOnly=true because they would be running against a different deployment.
      - name: Run Playwright behaviour tests
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          echo "BASE_URL=${{ steps.out.outputs.BASE_URL }}"
          echo "COGNITO_DOMAIN=${{ steps.out.outputs.COGNITO_DOMAIN }}"
          echo "COGNITO_CLIENT_ID=${{ steps.out.outputs.COGNITO_CLIENT_ID }}"
          BASE_URL='${{ steps.out.outputs.BASE_URL }}' \
          COGNITO_DOMAIN='${{ steps.out.outputs.COGNITO_DOMAIN }}' \
          COGNITO_CLIENT_ID='${{ steps.out.outputs.COGNITO_CLIENT_ID }}' \
          npx playwright test --project=chromium

      - name: Upload artifacts (report, trace, screenshots, videos)
        if: ${{ !cancelled() && inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results