<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OIDC - Cognito Login</title>
    <link rel="stylesheet" href="./oidc.css" />
  </head>
  <body>
    <header>
      <div class="header-nav">
        <div class="hamburger-menu">
          <button class="hamburger-btn">☰</button>
          <div class="menu-dropdown"><a href="./index.html">Home</a><div data-utils-target></div></div>
        </div>
        <div class="auth-section"><span class="login-status">Not logged in</span></div>
      </div>
    </header>
    <main class="container">
      <h1>OIDC - Cognito Login</h1>
      <div class="card">
        <p>You will be redirected to AWS Cognito's hosted UI for authentication.</p>
        <p>Cognito will federate to the OIDC provider in this repository, then return you to the post-auth page with your tokens.</p>
        <div id="status">Preparing authentication...</div>
        <div id="error" style="display: none; color: red; margin-top: 10px;"></div>
      </div>
    </main>
    <div id="modal-root"></div>
    <script src="./oidc.js" defer></script>
    <script>
      // Utility functions for OIDC/OAuth2 flow
      function randomString(length = 32) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
        let result = '';
        for (let i = 0; i < length; i++) {
          result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
      }

      async function sha256(plain) {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return window.crypto.subtle.digest('SHA-256', data);
      }

      function base64urlEscape(str) {
        return str.replace(/\+/g, '-')
                 .replace(/\//g, '_')
                 .replace(/=/g, '');
      }

      async function sha256base64url(plain) {
        const hashBuffer = await sha256(plain);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashBase64 = btoa(String.fromCharCode.apply(null, hashArray));
        return base64urlEscape(hashBase64);
      }

      async function initiateCognitoLogin() {
        try {
          // Generate OAuth2/OIDC parameters
          const state = randomString(32);
          const nonce = randomString(32);
          
          // PKCE parameters (even though Cognito handles this, we generate for completeness)
          const code_verifier = randomString(64);
          const code_challenge = await sha256base64url(code_verifier);
          
          // Store PKCE for later use (though Cognito flow may not need it)
          sessionStorage.setItem(
            "cognito_pkce:" + state,
            JSON.stringify({ code_verifier, state, nonce })
          );

          // Cognito configuration
          const currentDomain = window.location.host;
          const cognitoDomain = `auth.${currentDomain}`;
          const redirectUri = `${window.location.protocol}//${currentDomain}/post-authCognito.html`;
          
          // Try to get client ID from various sources
          let clientId = null;
          
          // 1. Check if injected globally by deployment
          if (window.COGNITO_CLIENT_ID) {
            clientId = window.COGNITO_CLIENT_ID;
          }
          
          // 2. Check URL parameters (for testing)
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('client_id')) {
            clientId = urlParams.get('client_id');
          }
          
          // 3. Use environment variable if available (would be injected during build)
          if (!clientId && window.location.search.includes('auto=true')) {
            // This would be the automatic mode for testing
            clientId = 'test-client-id';
          }
          
          if (!clientId) {
            // Show configuration instructions instead of error
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'block';
            errorEl.innerHTML = 
              '<strong>Cognito Configuration Required</strong><br><br>' +
              'This page requires a Cognito Client ID to function. You can:<br><br>' +
              '1. Add <code>?client_id=YOUR_CLIENT_ID</code> to the URL for testing<br>' +
              '2. Deploy with proper CDK configuration to inject the client ID<br>' +
              '3. Set <code>window.COGNITO_CLIENT_ID</code> globally<br><br>' +
              '<a href="./index.html">Return to home page</a>';
            document.getElementById('status').textContent = 'Configuration required';
            return;
          }
          
          // Construct Cognito Hosted UI URL
          const cognitoParams = new URLSearchParams({
            client_id: clientId,
            response_type: 'code',
            scope: 'openid email profile',
            redirect_uri: redirectUri,
            state: state,
            nonce: nonce,
            code_challenge: code_challenge,
            code_challenge_method: 'S256'
          });

          const cognitoUrl = `https://${cognitoDomain}/oauth2/authorize?${cognitoParams.toString()}`;
          
          document.getElementById('status').innerHTML = 
            `Redirecting to Cognito at <strong>${cognitoDomain}</strong>...<br><br>` +
            `<small>If not redirected automatically, <a href="${cognitoUrl}">click here</a></small>`;
          
          // Wait a moment for user to see the message, then redirect
          setTimeout(() => {
            window.location.href = cognitoUrl;
          }, 2000);
          
        } catch (error) {
          console.error('Error initiating Cognito login:', error);
          const errorEl = document.getElementById('error');
          errorEl.style.display = 'block';
          errorEl.textContent = 'Error preparing authentication: ' + error.message;
          document.getElementById('status').textContent = 'Authentication preparation failed';
        }
      }

      // Start the login process when page loads
      document.addEventListener('DOMContentLoaded', () => {
        initiateCognitoLogin();
      });
    </script>
    <footer><small>© 2025 <a href="https://github.com/antonycc/oidc">@antonycc/oidc</a></small></footer>
  </body>
</html>
