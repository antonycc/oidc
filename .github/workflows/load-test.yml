name: load-test
concurrency:
  group: "load-${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}"
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: '37 5 * * 0'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1
  TEST_USERNAME: test-user
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

jobs:
  load-test:
    name: "load-test-${{ github.ref_name }}"
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify Node environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Expected Node version: ${{ env.NODE_VERSION }}"

      - name: Node test
        run: npm ci && npm test

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Execute k6 load test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://oidc.antonycc.com' }}
          TEST_USERNAME: ${{ github.event.inputs.test_username || 'test-user' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          echo "BASE_URL: $BASE_URL"
          echo "TEST_USERNAME: $TEST_USERNAME"
          k6 run tests/load.live.test.js --summary-export=summary.json

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: summary.json
          if-no-files-found: ignore
