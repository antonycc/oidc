<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OIDC - Home</title>
    <link rel="stylesheet" href="./oidc.css" />
  </head>
  <body>
    <header>
      <div class="header-nav">
        <div class="hamburger-menu">
          <button class="hamburger-btn">☰</button>
          <div class="menu-dropdown"><div data-utils-target></div></div>
        </div>
        <div class="auth-section">
          <span class="login-status">Not logged in</span>
          <div class="login-links">
            <!-- a class="nav" href="./login.html">Login</a-->
          </div>
        </div>
      </div>
    </header>
    <main class="container">
      <h1>OIDC - Home</h1>
      <div class="card">
        <h2>Welcome to the OIDC Provider</h2>
        <p>This page demonstrates the OIDC discovery process in real-time.</p>
        <div class="button-group" style="margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap">
          <a
            href="./swagger.html"
            class="button"
            style="
              text-decoration: none;
              background: #1f4788;
              color: white;
              padding: 0.5rem 1rem;
              border-radius: 0.25rem;
              font-size: 0.9rem;
            "
            >📖 API Documentation</a
          >
          <a
            href="./openapi.yaml"
            class="button"
            style="
              text-decoration: none;
              background: #666;
              color: white;
              padding: 0.5rem 1rem;
              border-radius: 0.25rem;
              font-size: 0.9rem;
            "
            target="_blank"
            >📄 OpenAPI Spec</a
          >
          <a
            href="./login.html"
            class="button"
            style="
              text-decoration: none;
              background: #2563eb;
              color: white;
              padding: 0.5rem 1rem;
              border-radius: 0.25rem;
              font-size: 0.9rem;
            "
            >🔐 Try Login</a
          >
        </div>
      </div>

      <div class="card">
        <div class="terminal">
          <div class="terminal-header">
            <span>OIDC Discovery Process</span>
          </div>
          <div class="terminal-content" id="terminal-output">
            <div class="terminal-line">Initializing OIDC discovery...</div>
          </div>
        </div>
      </div>
    </main>
    <div id="modal-root"></div>
    <script src="./oidc.js" defer></script>
    <footer>
      <small>© 2025 <a href="https://github.com/antonycc/oidc">@antonycc/oidc</a></small>
    </footer>
  </body>
</html>
