<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OIDC - Login</title>
    <link rel="stylesheet" href="./oidc.css" />
  </head>
  <body>
    <header>
      <div class="header-nav">
        <div class="hamburger-menu">
          <button class="hamburger-btn">☰</button>
          <div class="menu-dropdown"><a href="./index.html">Home</a><div data-utils-target></div></div>
        </div>
        <div class="auth-section"><span class="login-status">Not logged in</span></div>
      </div>
    </header>
    <main class="container">
      <h1>Direct OP Login</h1>
      <div class="card">
        <p>
          Use this form to exercise the OP directly without Cognito. It will perform PKCE, post to
          <code>/authorize</code>, and redirect back to Post Auth.
        </p>
        <form id="loginForm" class="form-card">
          <label>Username <input type="text" name="username" required minlength="1" /></label>
          <label>Password <input type="password" name="password" required minlength="1" /></label>
          <label>Client ID <input type="text" name="client_id" value="self-client" required title="OIDC client identifier" /></label>
          <button type="submit">Sign in</button>
        </form>
        <div id="error" class="error" style="display: none"></div>
      </div>
    </main>
    <div id="modal-root"></div>
    <script src="./oidc.js" defer></script>
    <script>
      // Minimal PKCE helpers
      const rand = (len = 32) =>
        crypto.getRandomValues(new Uint8Array(len)).reduce((s, b) => s + ("0" + (b % 36).toString(36)).slice(-1), "");
      async function sha256base64url(input) {
        const data = new TextEncoder().encode(input);
        const hash = await crypto.subtle.digest("SHA-256", data);
        const b = btoa(String.fromCharCode(...new Uint8Array(hash)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
        return b;
      }
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const username = fd.get("username");
        const password = fd.get("password");
        const client_id = fd.get("client_id");
        
        // Validate required fields
        if (!username || !password || !client_id) {
          const el = document.getElementById("error");
          el.style.display = "block";
          el.textContent = "All fields are required.";
          return;
        }
        
        const redirect_uri = new URL("/post-auth.html", location.origin).toString();
        
        // Validate redirect_uri format
        try {
          new URL(redirect_uri);
        } catch (e) {
          const el = document.getElementById("error");
          el.style.display = "block";
          el.textContent = "Invalid redirect URI format.";
          return;
        }
        const scope = "openid email profile";
        const state = rand(16);
        const nonce = rand(16);
        const code_verifier = rand(64);
        const code_challenge = await sha256base64url(code_verifier);
        sessionStorage.setItem("pkce:" + state, JSON.stringify({ code_verifier, client_id, redirect_uri }));
        const params = new URLSearchParams({
          client_id,
          redirect_uri,
          response_type: "code",
          scope,
          state,
          nonce,
          code_challenge,
          code_challenge_method: "S256",
          username,
          password,
        });
        // Post as application/x-www-form-urlencoded
        const res = await fetch("/authorize", {
          method: "POST",
          headers: { "content-type": "application/x-www-form-urlencoded" },
          body: params.toString(),
          redirect: "manual",
        });
        if (res.status === 302) {
          const loc = res.headers.get("Location");
          location.href = loc;
        } else {
          const el = document.getElementById("error");
          el.style.display = "block";
          let message;
          switch (res.status) {
            case 400:
              message = "Invalid request. Please check your input.";
              break;
            case 401:
              message = "Authentication failed. Please check your username and password.";
              break;
            case 403:
              message = "You do not have permission to access this resource.";
              break;
            case 500:
              message = "Server error. Please try again later.";
              break;
            default:
              message = "An error occurred (" + res.status + "). Please try again.";
          }
          el.textContent = message;
          // Optionally log the raw error for debugging (not shown to user)
          const rawText = await res.text();
          console.debug("Raw error response:", rawText);
        }
      });
    </script>
    <footer><small>© 2025 <a href="https://github.com/antonycc/oidc">@antonycc/oidc</a></small></footer>
  </body>
</html>
