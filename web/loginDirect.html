<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OIDC - Direct Login</title>
    <link rel="stylesheet" href="./oidc.css" />
  </head>
  <body>
    <header>
      <div class="header-nav">
        <div class="hamburger-menu">
          <button class="hamburger-btn">☰</button>
          <div class="menu-dropdown"><a href="./index.html">Home</a><a href="./login.html">Login</a><div data-utils-target></div></div>
        </div>
        <div class="auth-section"><span class="login-status">Not logged in</span></div>
      </div>
    </header>
    <main class="container">
      <h1>OIDC - Direct Login</h1>
      <div class="card">
        <p>
          Use this form to exercise the OP directly without Cognito. It will perform PKCE, post to
          <code>/authorize</code>, and redirect back to Post Auth.
        </p>
        <p id="backLinkWrapper"><a id="backLink" href="./login.html">← Back to login options</a></p>
        <form id="loginForm" class="form-card">
          <fieldset>
            <legend>Credentials</legend>
            <label>Username <input type="text" name="username" required minlength="1" /></label>
            <label>Password <input type="password" name="password" required minlength="1" /></label>
          </fieldset>
          <fieldset>
            <legend>OIDC Parameters</legend>
            <label>Client ID <input type="text" name="client_id" value="self-client" required title="OIDC client identifier" /></label>
            <label>Redirect URI <input type="url" name="redirect_uri" required /></label>
            <label>Response Type <input type="text" name="response_type" value="code" required readonly /></label>
            <label>Scope <input type="text" name="scope" value="openid email profile" required /></label>
            <label>State <input type="text" name="state" required readonly /></label>
            <label>Nonce <input type="text" name="nonce" required readonly /></label>
            <label>Code Challenge <input type="text" name="code_challenge" required readonly /></label>
            <label>Code Challenge Method <input type="text" name="code_challenge_method" value="S256" required readonly /></label>
          </fieldset>
          <button type="submit">Sign in</button>
        </form>
        <p class="muted">Form will POST to: <code id="formActionDisplay"></code></p>
        <div id="error" class="error" style="display: none"></div>
      </div>
    </main>
    <div id="modal-root"></div>
    <script src="./oidc.js" defer></script>
    <script>
      // URL params and initial UI setup
      const urlParams = new URLSearchParams(window.location.search);
      const errorMsg = urlParams.get('error');
      if (errorMsg) {
        const errorEl = document.getElementById('error');
        errorEl.textContent = errorMsg;
        errorEl.style.display = 'block';
      }

      // Populate redirect_uri from query (?redirect=...)
      const redirectParam = urlParams.get('redirect_uri');
      const defaultRedirect = new URL('/post-auth.html', location.origin).toString();
      let resolvedRedirect;
      try {
        if (redirectParam) {
          // Support absolute or relative
          resolvedRedirect = new URL(redirectParam, location.origin).toString();
        } else {
          resolvedRedirect = defaultRedirect;
        }
      } catch (e) {
        resolvedRedirect = defaultRedirect;
      }
      const redirectInput = document.querySelector('input[name="redirect_uri"]');
      if (redirectInput) redirectInput.value = resolvedRedirect;

      // Hide back link if redirect host differs from current host
      try {
        const r = new URL(resolvedRedirect);
        if (r.host && r.host !== location.host) {
          const backWrapper = document.getElementById('backLinkWrapper');
          if (backWrapper) backWrapper.style.display = 'none';
        }
      } catch {}

      // Pre-fill client_id if provided via query param
      const clientIdInput = document.querySelector('input[name="client_id"]');
      const clientIdParam = urlParams.get('client_id');
      if (clientIdParam && clientIdInput) {
        clientIdInput.value = clientIdParam;
      }

      // Minimal PKCE helpers
      const rand = (len = 32) =>
        crypto.getRandomValues(new Uint8Array(len)).reduce((s, b) => s + ("0" + (b % 36).toString(36)).slice(-1), "");
      async function sha256base64url(input) {
        const data = new TextEncoder().encode(input);
        const hash = await crypto.subtle.digest("SHA-256", data);
        const b = btoa(String.fromCharCode(...new Uint8Array(hash)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
        return b;
      }
      const form = document.getElementById("loginForm");

      // Initialize fixed form attributes and display
      form.setAttribute("action", "/authorize");
      form.setAttribute("method", "POST");
      form.setAttribute("autocomplete", "on");
      const actionDisplay = document.getElementById('formActionDisplay');
      
      // Calculate fully qualified URL for form action display
      if (actionDisplay) {
        const actionUrl = form.getAttribute('action');
        let displayUrl = actionUrl;
        try {
          // If the action URL is not already a full URL (doesn't start with protocol), make it fully qualified
          if (actionUrl && !actionUrl.match(/^https?:\/\//)) {
            displayUrl = new URL(actionUrl, location.origin).toString();
          }
        } catch (e) {
          // Fallback to original if URL construction fails
          displayUrl = actionUrl;
        }
        actionDisplay.textContent = displayUrl;
      }

      // Generate PKCE values on page load and populate form fields
      async function initializePkceFields() {
        const state = rand(16);
        const nonce = rand(16);
        const code_verifier = rand(64);
        const code_challenge = await sha256base64url(code_verifier);

        // Fill visible inputs with generated values
        form.querySelector('input[name="state"]').value = state;
        form.querySelector('input[name="nonce"]').value = nonce;
        form.querySelector('input[name="code_challenge"]').value = code_challenge;

        // Store for later use during form submission
        window.pkceData = { state, nonce, code_verifier, code_challenge };
      }

      // Initialize PKCE fields on page load
      initializePkceFields();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const username = fd.get("username");
        const password = fd.get("password");
        const client_id = fd.get("client_id");
        const redirect_uri = String(fd.get("redirect_uri") || "");
        const scope = String(fd.get("scope") || "openid email profile");

        // Validate required fields
        if (!username || !password || !client_id || !redirect_uri) {
          const el = document.getElementById("error");
          el.style.display = "block";
          el.textContent = "All fields are required.";
          return;
        }

        // Validate redirect_uri format
        try {
          new URL(redirect_uri);
        } catch (e) {
          const el = document.getElementById("error");
          el.style.display = "block";
          el.textContent = "Invalid redirect URI format.";
          return;
        }

        // Use pre-generated PKCE values
        const { state, code_verifier } = window.pkceData;

        // Stash PKCE for post-auth token exchange
        sessionStorage.setItem(
          "pkce:" + state,
          JSON.stringify({ code_verifier, client_id, redirect_uri })
        );

        // Submit the form to trigger a real navigation handled by the browser
        form.submit();
      });
    </script>
    <footer><small>© 2025 <a href="https://github.com/antonycc/oidc">@antonycc/oidc</a></small></footer>
  </body>
</html>
