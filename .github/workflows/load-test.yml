name: load-test

on:
  # Manual dispatch with optional scenario selection
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which scenario to run (small, medium, large, xlarge)'
        required: false
        default: medium
        type: choice
        options:
          - small
          - medium
          - large
          - xlarge
  # Scheduled execution of the 10 000 user test every Sunday at 04:00
  #schedule:
  #  - cron: '0 4 * * 0'
  #    timezone: 'Europe/London'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1
  TEST_USERNAME: test-user
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

jobs:
  load-test:
    runs-on: ubuntu-latest
    # If the branch is main, the GitHub environment is prod otherwise the environment is ci
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify Node environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Expected Node version: ${{ env.NODE_VERSION }}"

      - name: Node test
        run: npm ci && npm test

      # Install the k6 binary.  This action downloads and caches
      # Grafana k6 (Go implementation).  Version can be pinned as
      # needed; we use the latest stable release.
      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # Determine which scenario to run.  For scheduled runs the
      # scenario defaults to `medium`; for manual runs it reads the
      # input from the workflow dispatch.
      - name: Set scenario
        id: set-scenario
        run: |
          if [[ "${{ github.event_name }}" == 'schedule' ]]; then
            echo "scenario=medium" >> $GITHUB_OUTPUT
          else
            echo "scenario=${{ github.event.inputs.scenario }}" >> $GITHUB_OUTPUT
          fi

      # Run the selected scenario.  Override the TARGET_URL and client
      # credentials here as environment variables.  If your OIDC
      # deployment requires different client IDs or passwords, set
      # appropriate repository or organization secrets and reference
      # them using the secrets context.
      - name: Execute k6 load test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://oidc.antonycc.com' }}
          TEST_USERNAME: ${{ github.event.inputs.test_username || 'test-user' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          SCENARIO="${{ steps.set-scenario.outputs.scenario }}"
          echo "Running k6 scenario: $SCENARIO"
          echo "BASE_URL: $BASE_URL"
          echo "TEST_USERNAME: $TEST_USERNAME"
          npm run test:load -- --scenario $SCENARIO --summary-export=summary.json

      # Optionally upload the k6 summary as an artifact for later
      # analysis.  The summary.json file contains detailed metrics
      # produced by k6 (latency percentiles, error counts, etc.).
      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: summary.json
          if-no-files-found: ignore