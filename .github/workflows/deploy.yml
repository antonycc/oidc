name: deploy
concurrency:
  group: "deploy-${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}"
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Run tests only (no deploy)'
        required: false
        default: 'false'
      deploymentName:
        description: 'Deployment name (ci for shared CI, or custom name)'
        required: false
        default: ''
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - '.github/workflows/deploy.yml'
      - 'app/**'
      - 'infra/**'
      - 'tests/**'
      - 'web/**'
      - 'well-known/**'
      - '.env.ci'
      - '.env.prod'
      - 'cdk.json'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'pom.xml'
  schedule:
    - cron: '23 4 * * *'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1

jobs:

  deploy:
    runs-on: ubuntu-24.04
    name: "deploy-${{ github.ref_name }}"
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute deployment name and environment
        id: deployment-config
        run: |
          REF_NAME="${{ github.ref_name }}"
          INPUT_DEPLOYMENT_NAME="${{ inputs.deploymentName }}"
          
          # Clean branch name: lowercase, replace non-alphanumeric with hyphens, collapse consecutive hyphens
          CLEANED=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9]/-/g' -e 's/-\{2,\}/-/g' -e 's/^-//' -e 's/-$//')
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              ENV_NAME="prod"
              DEPLOYMENT_NAME="prod"
          elif [ "$INPUT_DEPLOYMENT_NAME" = "ci" ]; then
              ENV_NAME="ci"
              DEPLOYMENT_NAME="ci"
          elif [ -n "$INPUT_DEPLOYMENT_NAME" ]; then
              ENV_NAME="ci"
              DEPLOYMENT_NAME="$INPUT_DEPLOYMENT_NAME"
          else
              ENV_NAME="ci"
              # Truncate to 16 chars for branch-based deployments
              DEPLOYMENT_NAME="ci-${CLEANED:0:16}"
          fi
          
          echo "ENV_NAME=$ENV_NAME" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME" >> "$GITHUB_ENV"
          echo "ENV_NAME=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          
          echo "Computed ENV_NAME: $ENV_NAME"
          echo "Computed DEPLOYMENT_NAME: $DEPLOYMENT_NAME"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify Node environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Expected Node version: ${{ env.NODE_VERSION }}"

      - name: Node test
        run: npm ci && npm test

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Verify Java environment
        run: |
          echo "Java version: $(java -version 2>&1 | head -1)"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Expected Java version: ${{ env.JAVA_VERSION }}"

      - name: Configure AWS creds via OIDC
        if: ${{ inputs.skipDeploy != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          docker buildx build \
            --load \
            -t "oidc-base:latest" \
            -f Dockerfile .

      # Once only per account
      #- name: Bootstrap CDK
      #  if: ${{ inputs.skipDeploy != 'true' }}
      #  run: npx cdk bootstrap
      #  env:
      #    CDK_NEW_BOOTSTRAP: '1'

      # Only deploy from main
      - name: Deploy OIDC Observability Stack (CDK)
        if: ${{ inputs.skipDeploy != 'true' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy ObservabilityStack-${ENV_NAME} --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-observability.json

      - name: Deploy OIDC Provider Stack (CDK)
        if: ${{ inputs.skipDeploy != 'true' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy OidcProviderStack-${DEPLOYMENT_NAME} --exclusively --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-oidc-provider.json

      - name: Resolve OIDC Provider and Cognito outputs
        if: ${{ inputs.skipDeploy != 'true' }}
        id: oidc-outputs
        run: |
          ENV_NAME='${{ env.ENV_NAME }}'
          DEPLOYMENT_NAME='${{ env.DEPLOYMENT_NAME }}'
          BASE_URL=$(jq -r '.["OidcProviderStack-'${DEPLOYMENT_NAME}'"].BaseUrl' cdk.out/cdk-outputs-oidc-provider.json)
          USERS_TABLE=$(jq -r '.["OidcProviderStack-'${DEPLOYMENT_NAME}'"].UsersTableName' cdk.out/cdk-outputs-oidc-provider.json)
          echo "ENV_NAME=$ENV_NAME"
          echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME"
          echo "BASE_URL=$BASE_URL"
          echo "USERS_TABLE=$USERS_TABLE"
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME" >> $GITHUB_OUTPUT
          echo "BASE_URL=$BASE_URL" >> $GITHUB_OUTPUT
          echo "USERS_TABLE=$USERS_TABLE" >> $GITHUB_OUTPUT
          #echo "COGNITO_DOMAIN=$COGNITO_DOMAIN" >> $GITHUB_OUTPUT
          #echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> $GITHUB_OUTPUT
        shell: bash

      - name: Wait 10 seconds for CloudFront distribution testing
        if: ${{ inputs.skipDeploy != 'true' }}
        id: setup-cloudfront-tests
        run: sleep 10

      # Individual tests of endpoints, uncomment to debug
      #- name: Web bucket default behavior
      #  if: ${{ inputs.skipDeploy != 'true' }}
      #  run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/"

      #- name: Web bucket file behavior
      #  if: ${{ inputs.skipDeploy != 'true' }}
      #  run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/post-auth.html"

      #- name: Well-known endpoint behavior
      #  if: ${{ inputs.skipDeploy != 'true' }}
      #  run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/.well-known/openid-configuration"

      #- name: Well-known JWKS behavior
      #  if: ${{ inputs.skipDeploy != 'true' }}
      #  run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/jwks"

      - name: Install dependencies and Playwright browsers
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Run Playwright live API test
        env:
          BASE_URL: ${{ steps.oidc-outputs.outputs.BASE_URL }}
          USERS_TABLE: ${{ steps.oidc-outputs.outputs.USERS_TABLE }}
        run: |
          echo "BASE_URL=${BASE_URL}"
          npm run test:api

      - name: Run Playwright behaviour tests
        run: |
          echo "BASE_URL=${{ steps.oidc-outputs.outputs.BASE_URL }}"
          #echo "COGNITO_DOMAIN=${{ steps.oidc-outputs.outputs.COGNITO_DOMAIN }}"
          #echo "COGNITO_CLIENT_ID=${{ steps.oidc-outputs.outputs.COGNITO_CLIENT_ID }}"
          BASE_URL='${{ steps.oidc-outputs.outputs.BASE_URL }}' \
          USERS_TABLE='${{ steps.oidc-outputs.outputs.USERS_TABLE }}' \
          npm run test:web --project=chromium

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 load test (5 minutes)
        env:
          BASE_URL: ${{ steps.oidc-outputs.outputs.BASE_URL }}
        run: |
          echo "BASE_URL=${BASE_URL}"
          k6 run tests/load.live.test.js --summary-export=load-test-summary.json

      - name: Upload artifacts (report, trace, screenshots, videos)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            load-test-summary.json
