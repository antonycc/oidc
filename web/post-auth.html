<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Auth</title>
    <link rel="stylesheet" href="./oidc.css" />
  </head>
  <body>
    <header>
      <div class="header-nav">
        <div class="hamburger-menu">
          <button class="hamburger-btn">☰</button>
          <div class="menu-dropdown"><a href="/index.html">Home</a></div>
        </div>
        <div class="auth-section"><span class="login-status">Checking…</span></div>
      </div>
    </header>
    <main class="container">
      <h1>Post Auth</h1>
      <div class="card">
        <p id="status">Looking for authorization code in URL…</p>
        <pre id="result" class="code"></pre>
        <pre id="claims" class="code"></pre>
      </div>
    </main>
    <script>
      // Shared login status checking function
      function checkLoginStatus() {
        try {
          const tokenData = localStorage.getItem("oidc_tokens");
          if (!tokenData) {
            return { isLoggedIn: false, status: "Not logged in" };
          }
          
          const tokens = JSON.parse(tokenData);
          if (!tokens.expires_at || Date.now() >= tokens.expires_at) {
            // Token expired, clear it
            localStorage.removeItem("oidc_tokens");
            return { isLoggedIn: false, status: "Not logged in" };
          }
          
          const userDisplay = tokens.userinfo?.name || tokens.claims?.sub || "User";
          return { 
            isLoggedIn: true, 
            status: `Logged in as ${userDisplay}`,
            tokens: tokens
          };
        } catch (e) {
          console.warn("Error checking login status:", e);
          localStorage.removeItem("oidc_tokens");
          return { isLoggedIn: false, status: "Not logged in" };
        }
      }
      
      // Update login status on page load
      document.addEventListener("DOMContentLoaded", () => {
        const loginStatus = checkLoginStatus();
        const loginElement = document.querySelector(".login-status");
        if (loginElement) {
          loginElement.textContent = loginStatus.status;
        }
        
        // Add logout functionality if logged in
        if (loginStatus.isLoggedIn) {
          const authSection = document.querySelector(".auth-section");
          if (authSection && !authSection.querySelector(".logout-btn")) {
            const logoutBtn = document.createElement("button");
            logoutBtn.textContent = "Logout";
            logoutBtn.className = "logout-btn nav";
            logoutBtn.style.marginLeft = "10px";
            logoutBtn.addEventListener("click", () => {
              localStorage.removeItem("oidc_tokens");
              location.reload();
            });
            authSection.appendChild(logoutBtn);
          }
        }
      });
      
      function decodeJwtNoVerify(jwt) {
        try {
          const [, payload] = jwt.split(".");
          const base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
          const paddedBase64 = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
          return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(paddedBase64), (c) => c.charCodeAt(0))));
        } catch {
          return null;
        }
      }
      async function exchange(code, state) {
        const key = "pkce:" + state;
        const stash = sessionStorage.getItem(key);
        if (!stash) throw new Error("Missing PKCE data for state");
        
        let pkceData;
        try {
          pkceData = JSON.parse(stash);
        } catch (e) {
          throw new Error("Invalid PKCE data format");
        }
        
        const { code_verifier, client_id, redirect_uri } = pkceData;
        
        // Validate required PKCE parameters
        if (!code_verifier || !client_id || !redirect_uri) {
          throw new Error("Missing required PKCE parameters");
        }
        
        const body = new URLSearchParams({
          grant_type: "authorization_code",
          code,
          code_verifier,
          client_id,
          redirect_uri,
        });
        const res = await fetch("/token", {
          method: "POST",
          headers: { "content-type": "application/x-www-form-urlencoded" },
          body,
        });
        const txt = await res.text();
        let obj;
        try {
          obj = JSON.parse(txt);
        } catch {
          obj = { raw: txt };
        }
        document.getElementById("result").textContent = JSON.stringify(obj, null, 2);
        if (res.ok && obj.id_token) {
          const claims = decodeJwtNoVerify(obj.id_token);
          document.getElementById("claims").textContent = JSON.stringify(claims, null, 2);
          document.querySelector(".login-status").textContent = "Logged in";
          document.getElementById("status").textContent = "Token exchange succeeded";
          
          // Store tokens in localStorage
          const tokenData = {
            access_token: obj.access_token,
            id_token: obj.id_token,
            token_type: obj.token_type || "Bearer",
            expires_at: Date.now() + (obj.expires_in || 300) * 1000, // Convert to absolute timestamp
            claims: claims
          };
          localStorage.setItem("oidc_tokens", JSON.stringify(tokenData));
          
          // Call userinfo endpoint if we have an access token
          if (obj.access_token) {
            try {
              // Validate access token format
              if (typeof obj.access_token !== "string" || obj.access_token.trim() === "") {
                console.warn("Invalid access token format");
                return;
              }
              
              const userinfoRes = await fetch("/userinfo", {
                headers: { "authorization": "Bearer " + obj.access_token }
              });
              if (userinfoRes.ok) {
                const userinfo = await userinfoRes.json();
                document.getElementById("claims").textContent = 
                  JSON.stringify(claims, null, 2) + "\n\nUserinfo:\n" + JSON.stringify(userinfo, null, 2);
                
                // Store userinfo in localStorage
                tokenData.userinfo = userinfo;
                localStorage.setItem("oidc_tokens", JSON.stringify(tokenData));
              } else {
                console.warn("Failed to fetch userinfo:", userinfoRes.status);
              }
            } catch (e) {
              console.warn("Error fetching userinfo:", e);
            }
          }
        } else {
          document.querySelector(".login-status").textContent = "Login failed";
          document.getElementById("status").textContent = "Token exchange failed (" + res.status + ")";
        }
        sessionStorage.removeItem(key);
      }
      const qs = new URL(location.href).searchParams;
      const code = qs.get("code");
      const state = qs.get("state");
      if (code) {
        document.getElementById("status").textContent = "Received code=" + code;
        const key = "pkce:" + state;
        if (sessionStorage.getItem(key)) {
          exchange(code, state).catch((e) => {
            document.getElementById("status").textContent = "Error: " + e.message;
            document.querySelector(".login-status").textContent = "Login failed";
          });
        } else {
          // Likely came from Cognito Hosted UI; show code only
          document.querySelector(".login-status").textContent = "Logged in (via Cognito+OIDC)";
        }
      } else {
        document.getElementById("status").textContent = "No code present";
        document.querySelector(".login-status").textContent = "Not logged in";
      }
    </script>
    <footer><small>© 2025 OIDC Provider</small></footer>
  </body>
</html>
