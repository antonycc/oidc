name: test-and-deploy

on:
  workflow_dispatch:
    inputs:
      testOnly:
        description: 'Run tests only (no deploy)'
        required: false
        default: 'false'
      baseUrl:
        description: 'Existing deployed BASE_URL for testOnly runs (e.g. https://oidc.antonycc.com)'
        required: false
        default: ''
  push:
    branches:
      - '**'
      - '!gh_pages'
  schedule:
    - cron: '23 4 * * *'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1
  ENV_NAME: prod

jobs:

  build-deploy-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node test
        run: npm ci && npm test

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure AWS creds via OIDC
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          docker buildx build \
            --load \
            -t "oidc-base:latest" \
            -f Dockerfile .

      # Once only per account
      #- name: Bootstrap CDK
      #  if: ${{ inputs.testOnly != 'true' }}
      #  run: npx cdk bootstrap
      #  env:
      #    CDK_NEW_BOOTSTRAP: '1'

      # Only deploy from main
      - name: Deploy OIDC Provider Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy OidcProviderStack-${ENV_NAME} --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-oidc-provider.json

      - name: Setup CloudFront distribution testing
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: setup-cloudfront-tests
        run: |
          ENV_NAME='${{ env.ENV_NAME }}'
          BASE_URL=$(jq -r '.["OidcProviderStack-'${ENV_NAME}'"].BaseUrl' cdk.out/cdk-outputs-oidc-provider.json)
          echo "BASE_URL=$BASE_URL" >> $GITHUB_OUTPUT
          echo "$BASE_URL"
          sleep 30

      - name: Web bucket default behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.setup-cloudfront-tests.outputs.BASE_URL }}/"

      - name: Web bucket file behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.setup-cloudfront-tests.outputs.BASE_URL }}/post-auth.html"

      - name: Well-known endpoint behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.setup-cloudfront-tests.outputs.BASE_URL }}/.well-known/openid-configuration"

      - name: Well-known JWKS behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.setup-cloudfront-tests.outputs.BASE_URL }}/.well-known/jwks.json"

      - name: Deploy Cognito Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy CognitoStack-${ENV_NAME} --exclusively --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-cognito.json

      - name: Resolve BASE_URL and Cognito outputs
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: out
        run: |
          ENV_NAME='${{ env.ENV_NAME }}'
          BASE=$(jq -r '.["OidcProviderStack-'${ENV_NAME}'"].BaseUrl' cdk.out/cdk-outputs-oidc-provider.json)
          COGD=$(jq -r '.["CognitoStack-'${ENV_NAME}'"].CognitoAuthDomain' cdk.out/cdk-outputs-cognito.json)
          CLID=$(jq -r '.["CognitoStack-'${ENV_NAME}'"].UserPoolClientId' cdk.out/cdk-outputs-cognito.json)
          echo "BASE_URL=$BASE" >> $GITHUB_OUTPUT
          echo "COGNITO_DOMAIN=$COGD" >> $GITHUB_OUTPUT
          echo "COGNITO_CLIENT_ID=$CLID" >> $GITHUB_OUTPUT
        shell: bash

      - name: Provision test user
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: npm run provision:user test-user Passw0rd!
        env:
          USERS_TABLE: ${{ env.USERS_TABLE }}

      - name: Install dependencies and Playwright browsers
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      # The behaviour tests are not run for testOnly=true because they would be running against a different deployment.
      - name: Run Playwright behaviour tests
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          echo "BASE_URL=${{ steps.out.outputs.BASE_URL }}"
          echo "COGNITO_DOMAIN=${{ steps.out.outputs.COGNITO_DOMAIN }}"
          echo "COGNITO_CLIENT_ID=${{ steps.out.outputs.COGNITO_CLIENT_ID }}"
          BASE_URL='${{ steps.out.outputs.BASE_URL }}' \
          COGNITO_DOMAIN='${{ steps.out.outputs.COGNITO_DOMAIN }}' \
          COGNITO_CLIENT_ID='${{ steps.out.outputs.COGNITO_CLIENT_ID }}' \
          npx playwright test --project=chromium

      - name: Upload artifacts (report, trace, screenshots, videos)
        if: ${{ !cancelled() && inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
