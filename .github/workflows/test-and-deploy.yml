name: test-and-deploy
concurrency: "test-and-deploy-${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      testOnly:
        description: 'Run tests only (no deploy)'
        required: false
        default: 'false'
      baseUrl:
        description: 'Existing deployed BASE_URL for testOnly runs (e.g. https://oidc.antonycc.com)'
        required: false
        default: ''
  push:
    branches:
      - '**'
      - '!gh_pages'
  schedule:
    - cron: '23 4 * * *'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1
  ENV_NAME: prod
  TEST_USERNAME: test-user
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

jobs:

  build-deploy-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node test
        run: npm ci && npm test

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure AWS creds via OIDC
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          docker buildx build \
            --load \
            -t "oidc-base:latest" \
            -f Dockerfile .

      # Once only per account
      #- name: Bootstrap CDK
      #  if: ${{ inputs.testOnly != 'true' }}
      #  run: npx cdk bootstrap
      #  env:
      #    CDK_NEW_BOOTSTRAP: '1'

      # Only deploy from main
      - name: Deploy OIDC Observability Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy ObservabilityStack-${ENV_NAME} --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-observability.json

      - name: Deploy OIDC Provider Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy OidcProviderStack-${ENV_NAME} --exclusively --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-oidc-provider.json

      - name: Deploy Cognito Stack (CDK)
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npx dotenv -e .env.${{ env.ENV_NAME }} -- npx cdk deploy CognitoStack-${ENV_NAME} --exclusively --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-cognito.json

      - name: Resolve OIDC Provider and Cognito outputs
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: oidc-outputs
        run: |
          ENV_NAME='${{ env.ENV_NAME }}'
          BASE_URL=$(jq -r '.["OidcProviderStack-'${ENV_NAME}'"].BaseUrl' cdk.out/cdk-outputs-oidc-provider.json)
          USERS_TABLE=$(jq -r '.["OidcProviderStack-'${ENV_NAME}'"].UsersTableName' cdk.out/cdk-outputs-oidc-provider.json)
          COGNITO_DOMAIN=$(jq -r '.["CognitoStack-'${ENV_NAME}'"].CognitoAuthDomain' cdk.out/cdk-outputs-cognito.json)
          COGNITO_CLIENT_ID=$(jq -r '.["CognitoStack-'${ENV_NAME}'"].UserPoolClientId' cdk.out/cdk-outputs-cognito.json)
          echo "ENV_NAME=$ENV_NAME"
          echo "BASE_URL=$BASE_URL"
          echo "USERS_TABLE=$USERS_TABLE"
          echo "COGNITO_DOMAIN=$COGNITO_DOMAIN"
          echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID"
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "BASE_URL=$BASE_URL" >> $GITHUB_OUTPUT
          echo "USERS_TABLE=$USERS_TABLE" >> $GITHUB_OUTPUT
          echo "COGNITO_DOMAIN=$COGNITO_DOMAIN" >> $GITHUB_OUTPUT
          echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> $GITHUB_OUTPUT
        shell: bash

      - name: Wait 30 seconds for CloudFront distribution testing
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: setup-cloudfront-tests
        run: sleep 30

      - name: Web bucket default behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/"

      - name: Web bucket file behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/post-auth.html"

      - name: Well-known endpoint behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/.well-known/openid-configuration"

      - name: Well-known JWKS behavior
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: curl --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/jwks"

      - name: Provision test user
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: npm run provision:user ${{ env.TEST_USERNAME }} ${{ env.TEST_PASSWORD }}
        env:
          USERS_TABLE: ${{ steps.oidc-outputs.outputs.USERS_TABLE }}

      - name: Test JWKS endpoint
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: test-jwks
        run: |
          echo "Testing JWKS endpoint..."
          response=$(curl -s --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/jwks")
          echo "JWKS Response:"
          echo "$response"
          
          # Extract and validate JSON body
          body=$(echo "$response" | tail -n 1)
          echo "JWKS body: $body"
          
          # Verify it's valid JSON with keys
          if echo "$body" | jq -e '.keys | length > 0' > /dev/null; then
            echo "✓ JWKS endpoint returned valid keys"
          else
            echo "✗ JWKS endpoint failed - no keys found"
            exit 1
          fi

      - name: Test authorize endpoint
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: test-authorize
        run: |
          echo "Testing authorize endpoint with credentials..."
          
          # Generate PKCE code_verifier and code_challenge dynamically
          code_verifier=$(openssl rand -base64 32 | tr -d '=+/ ' | cut -c1-43)
          code_challenge=$(echo -n "$code_verifier" | openssl dgst -sha256 -binary | base64 | tr '+/' '-_' | tr -d '=' | tr -d '\n')
          echo "PKCE code_verifier: $code_verifier"
          echo "PKCE code_challenge: $code_challenge"
          

          # Build authorize URL (without credentials in query)
          auth_url="${{ steps.oidc-outputs.outputs.BASE_URL }}/authorize"
          
          # Prepare form data for POST request
          form_data="response_type=code"
          form_data="${form_data}&client_id=demo-client"
          form_data="${form_data}&redirect_uri=https://example.com/callback"
          form_data="${form_data}&scope=openid"
          form_data="${form_data}&state=test-state"
          form_data="${form_data}&code_challenge=${code_challenge}"
          form_data="${form_data}&code_challenge_method=S256"
          form_data="${form_data}&username=${{ env.TEST_USERNAME }}"
          form_data="${form_data}&password=${{ env.TEST_PASSWORD }}"
          
          echo "Authorize URL: $auth_url"
          echo "Form data: $form_data"
          
          # Call authorize endpoint expecting 302 redirect, using POST
          response=$(curl -s -i --request POST "$auth_url" --header "Content-Type: application/x-www-form-urlencoded" --data "$form_data" || true)
          echo "Authorize Response:"
          echo "$response"
          
          # Extract authorization code from Location header
          location=$(echo "$response" | grep -i "location:" | head -1 | sed 's/location: *//i' | tr -d '\r\n')
          echo "Location header: $location"
          
          if [[ "$location" == *"code="* ]]; then
            code=$(echo "$location" | sed 's/.*code=\([^&]*\).*/\1/')
            echo "AUTH_CODE=$code" >> $GITHUB_OUTPUT
            echo "✓ Authorization successful, code: $code"
          else
            echo "✗ Authorization failed - no code in redirect"
            exit 1
          fi

      - name: Test token endpoint
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: test-token
        run: |
          echo "Testing token endpoint with authorization code..."
          
          # Generate PKCE code_verifier and code_challenge dynamically
          code_verifier=$(openssl rand -base64 32 | tr -d '=+/ ' | cut -c1-43)
          code_challenge=$(echo -n "$code_verifier" | openssl dgst -sha256 -binary | base64 | tr '+/' '-_' | tr -d '=' | tr -d '\n')
          echo "PKCE code_verifier: $code_verifier"
          echo "PKCE code_challenge: $code_challenge"
          
          # Exchange code for tokens
          response=$(curl -s --include --request POST "${{ steps.oidc-outputs.outputs.BASE_URL }}/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=authorization_code&code=${{ steps.test-authorize.outputs.AUTH_CODE }}&redirect_uri=https://example.com/callback&client_id=demo-client&code_verifier=${code_verifier}")
          
          echo "Token Response:"
          echo "$response"
          
          # Extract JSON body and access token
          body=$(echo "$response" | tail -n 1)
          echo "Token body: $body"
          
          if echo "$body" | jq -e '.access_token' > /dev/null; then
            access_token=$(echo "$body" | jq -r '.access_token')
            echo "ACCESS_TOKEN=$access_token" >> $GITHUB_OUTPUT
            echo "✓ Token exchange successful"
          else
            echo "✗ Token exchange failed - no access_token"
            exit 1
          fi

      - name: Test userinfo endpoint
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        id: test-userinfo
        run: |
          echo "Testing userinfo endpoint with access token..."
          
          response=$(curl -s --include --request GET "${{ steps.oidc-outputs.outputs.BASE_URL }}/userinfo" \
            --header "Authorization: Bearer ${{ steps.test-token.outputs.ACCESS_TOKEN }}")
          
          echo "Userinfo Response:"
          echo "$response"
          
          # Extract JSON body and validate user info
          body=$(echo "$response" | tail -n 1)
          echo "Userinfo body: $body"
          
          if echo "$body" | jq -e '.sub' > /dev/null; then
            sub=$(echo "$body" | jq -r '.sub')
            echo "✓ Userinfo successful, subject: $sub"
          else
            echo "✗ Userinfo failed - no subject"
            exit 1
          fi

      - name: Install dependencies and Playwright browsers
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      # The behaviour tests are not run for testOnly=true because they would be running against a different deployment.
      - name: Run Playwright behaviour tests
        if: ${{ inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        run: |
          echo "COGNITO_DOMAIN=${{ steps.oidc-outputs.outputs.COGNITO_DOMAIN }}"
          echo "COGNITO_CLIENT_ID=${{ steps.oidc-outputs.outputs.COGNITO_CLIENT_ID }}"
          COGNITO_DOMAIN='${{ steps.oidc-outputs.outputs.COGNITO_DOMAIN }}' \
          COGNITO_CLIENT_ID='${{ steps.oidc-outputs.outputs.COGNITO_CLIENT_ID }}' \
          npx playwright test --project=chromium

      - name: Upload artifacts (report, trace, screenshots, videos)
        if: ${{ !cancelled() && inputs.testOnly != 'true' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
