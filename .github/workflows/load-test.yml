name: load-test

on:
  # Manual dispatch with optional scenario selection
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which scenario to run (small, medium, large, xlarge)'
        required: false
        default: medium
        type: choice
        options:
          - small
          - medium
          - large
          - xlarge
      base_url:
        description: 'Base URL of the OIDC service'
        required: false
        default: 'https://oidc.antonycc.com'
        type: string
      test_username:
        description: 'Test username for authentication'
        required: false
        default: 'test-user'
        type: string
  # Scheduled execution of the 10 000 user test every Sunday at 04:00
  #schedule:
  #  - cron: '0 4 * * 0'
  #    timezone: 'Europe/London'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js 22 as required by the project
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Install dependencies including Playwright
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Determine which scenario to run. For scheduled runs the
      # scenario defaults to `medium`; for manual runs it reads the
      # input from the workflow dispatch.
      - name: Set scenario
        id: set-scenario
        run: |
          if [[ "${{ github.event_name }}" == 'schedule' ]]; then
            echo "scenario=medium" >> $GITHUB_OUTPUT
          else
            echo "scenario=${{ github.event.inputs.scenario }}" >> $GITHUB_OUTPUT
          fi

      # Run the selected scenario using the Playwright-based load test script.
      # This script replicates the same OIDC flow as tests/api.live.test.ts
      # but runs it efficiently with controlled concurrency for load testing.
      - name: Execute Playwright load test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://oidc.antonycc.com' }}
          TEST_USERNAME: ${{ github.event.inputs.test_username || 'test-user' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'Passw0rd!' }}
        run: |
          SCENARIO="${{ steps.set-scenario.outputs.scenario }}"
          echo "Running Playwright load test scenario: $SCENARIO"
          echo "Base URL: $BASE_URL"
          echo "Test Username: $TEST_USERNAME"
          
          # Run the load test script with the selected scenario
          node scripts/load-test.mjs $SCENARIO

      # Upload the load test results as an artifact for later analysis.
      # The results.json file contains detailed metrics similar to k6
      # (success rates, latency percentiles, error counts, etc.).
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ steps.set-scenario.outputs.scenario }}
          path: load-test-results.json
          if-no-files-found: ignore