name: deploy
concurrency:
  group: "deploy-${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}"
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      skipDeploy:
        description: 'Run tests only (no deploy)'
        required: false
        default: 'false'
      deploymentName:
        description: 'Deployment name (ci for shared CI, or custom name)'
        required: false
        default: ''
  push:
    branches:
      - '**'
      - '!gh_pages'
    paths:
      - '.github/workflows/deploy.yml'
      - 'app/**'
      - 'infra/**'
      - 'tests/**'
      - 'web/**'
      - 'well-known/**'
      - '.env.ci'
      - '.env.prod'
      - 'cdk.json'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'pom.xml'
  schedule:
    - cron: '23 4 * * *'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DEPLOY_ROLE_ARN: ${{ vars.DEPLOY_ROLE_ARN }}
  AWS_REGION: us-east-1

jobs:

  names:
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute deployment name and environment
        id: deployment-config
        run: |
          REF_NAME="${{ github.ref_name }}"
          INPUT_DEPLOYMENT_NAME="${{ inputs.deploymentName }}"

          # Clean branch name: lowercase, replace non-alphanumeric with hyphens, collapse consecutive hyphens
          CLEANED=$(echo "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9]/-/g' -e 's/-\{2,\}/-/g' -e 's/^-//' -e 's/-$//')

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              ENV_NAME="prod"
              DEPLOYMENT_NAME="prod"
          elif [ "$INPUT_DEPLOYMENT_NAME" = "ci" ]; then
              ENV_NAME="ci"
              DEPLOYMENT_NAME="ci"
          elif [ -n "$INPUT_DEPLOYMENT_NAME" ]; then
              ENV_NAME="ci"
              DEPLOYMENT_NAME="$INPUT_DEPLOYMENT_NAME"
          else
              ENV_NAME="ci"
              # Truncate to 16 chars for branch-based deployments
              DEPLOYMENT_NAME="ci-${CLEANED:0:16}"
          fi

          echo "ENV_NAME=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "Computed ENV_NAME: $ENV_NAME"
          echo "Computed DEPLOYMENT_NAME: $DEPLOYMENT_NAME"
    outputs:
      environment-name: ${{ steps.deployment-config.outputs.ENV_NAME }}
      deployment-name: ${{ steps.deployment-config.outputs.DEPLOYMENT_NAME }}

  deploy-observability:
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package -DskipTests

      # Once only per account
      #- name: Bootstrap CDK
      #  run: npx cdk bootstrap
      #  env:
      #    CDK_NEW_BOOTSTRAP: '1'

      - name: Deploy Observability Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- npx cdk deploy ObservabilityStack-${{ needs.names.outputs.environment-name }} --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-observability.json
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.environment-name }}

  deploy-dev:
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - deploy-observability
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package -DskipTests

      - name: Deploy Dev Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- npx cdk deploy DevStack-${{ needs.names.outputs.environment-name }} --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-dev.json
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.environment-name }}

  build-images:
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - deploy-dev
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup image tag
        id: image-tag
        run: |
          BASE_IMAGE_TAG="submit-base:${{ github.sha }}"
          echo "base-image-tag=$BASE_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Building/loading base image with tag: $BASE_IMAGE_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          docker buildx build \
            --load \
            -t "${{ steps.image-tag.outputs.base-image-tag }}" \
            -f Dockerfile .

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Get ECR repository URI
        id: ecr-uri
        shell: bash
        run: |
          STACK_NAME="DevStack-${{ needs.names.outputs.environment-name }}"
          ECR_URI=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`EcrRepositoryUri`].OutputValue' \
            --output text)
          echo "ecr-uri=${ECR_URI}" | tee -a "${GITHUB_OUTPUT}"
          echo "ECR Repository URI: $ECR_URI"

      - name: Login to Amazon ECR
        shell: bash
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr-uri.outputs.ecr-uri }}

      - name: Tag and push Docker image to ECR
        shell: bash
        run: |
          BASE_IMAGE_TAG="${{ steps.image-tag.outputs.base-image-tag }}"
          ECR_URI="${{ steps.ecr-uri.outputs.ecr-uri }}"
          COMMIT_HASH="${{ github.sha }}"

          # Tag with commit hash and latest
          docker tag $BASE_IMAGE_TAG $ECR_URI:$COMMIT_HASH
          docker tag $BASE_IMAGE_TAG $ECR_URI:latest

          # Push both tags
          docker push $ECR_URI:$COMMIT_HASH
          docker push $ECR_URI:latest

          echo "Successfully pushed Docker image to ECR:"
          echo "  $ECR_URI:$COMMIT_HASH"
          echo "  $ECR_URI:latest"
    outputs:
        base-image-tag: ${{ steps.image-tag.outputs.base-image-tag }}
        commit-sha: ${{ github.sha }}
        ecr-uri: ${{ steps.ecr-uri.outputs.ecr-uri }}
        commit-image-tag: ${{ steps.ecr-uri.outputs.ecr-uri }}:${{ github.sha }}
        latest-image-tag: ${{ steps.ecr-uri.outputs.ecr-uri }}:latest

  deploy-provider:
    if: ${{ inputs.skipDeploy != 'true' }}
    needs:
      - names
      - deploy-observability
      - deploy-dev
      - build-images
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Node dependencies
        run: npm ci

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Build CDK and synth
        run: ./mvnw --errors clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build base image
        id: build
        run: |
          docker buildx build \
            --load \
            -t "oidc-base:latest" \
            -f Dockerfile .

      - name: Deploy Provider Stack (CDK)
        run: |
          npx dotenv -e .env.${{ needs.names.outputs.environment-name }} -- npx cdk deploy ProviderStack-${{ needs.names.outputs.deployment-name }} --exclusively --require-approval never --ci true --strict --validation --outputs-file cdk.out/cdk-outputs-provider.json
        env:
          ENV_NAME: ${{ needs.names.outputs.environment-name }}
          DEPLOYMENT_NAME: ${{ needs.names.outputs.deployment-name }}

      - name: Resolve stack outputs
        id: oidc-outputs
        run: |
          BASE_URL=$(jq -r '.["ProviderStack-${{ needs.names.outputs.deployment-name }}"].BaseUrl' cdk.out/cdk-outputs-provider.json)
          USERS_TABLE=$(jq -r '.["ProviderStack-${{ needs.names.outputs.deployment-name }}"].UsersTableName' cdk.out/cdk-outputs-provider.json)
          echo "BASE_URL=$BASE_URL"
          echo "USERS_TABLE=$USERS_TABLE"
          echo "BASE_URL=$BASE_URL" >> $GITHUB_OUTPUT
          echo "USERS_TABLE=$USERS_TABLE" >> $GITHUB_OUTPUT
        shell: bash
    outputs:
      base-url: ${{ steps.oidc-outputs.outputs.BASE_URL }}
      users-table: ${{ steps.oidc-outputs.outputs.USERS_TABLE }}

  api-test:
    needs:
      - names
      - deploy-observability
      - deploy-dev
      - deploy-provider
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Create test username and a test password
        id: uuid
        run: |
          TEST_USERNAME=$(uuidgen | tr '[:upper:]' '[:lower:]')
          TEST_PASSWORD=$(uuidgen | tr '[:upper:]' '[:lower:]')
          echo "TEST_USERNAME=${TEST_USERNAME?}"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}"
          echo "TEST_USERNAME=${TEST_USERNAME?}" >> "$GITHUB_OUTPUT"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}" >> "$GITHUB_OUTPUT"

      - name: Provision test user
        run: npm run users:provision '${{ needs.deploy-provider.outputs.users-table }}' '${{ steps.uuid.outputs.TEST_USERNAME }}' '${{ steps.uuid.outputs.TEST_PASSWORD }}'

      - name: Install dependencies and Playwright browsers
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Run Playwright API test
        run: |
          echo "BASE_URL=${BASE_URL}"
          npm run test:api
        env:
          BASE_URL: ${{ needs.deploy-provider.outputs.base-url }}
          TEST_USERNAME: ${{ steps.uuid.outputs.TEST_USERNAME }}
          TEST_PASSWORD: ${{ steps.uuid.outputs.TEST_PASSWORD }}

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            playwright-report
            test-results

  web-test:
    needs:
      - names
      - deploy-observability
      - deploy-dev
      - deploy-provider
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Create test username and a test password
        id: uuid
        run: |
          TEST_USERNAME=$(uuidgen | tr '[:upper:]' '[:lower:]')
          TEST_PASSWORD=$(uuidgen | tr '[:upper:]' '[:lower:]')
          echo "TEST_USERNAME=${TEST_USERNAME?}"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}"
          echo "TEST_USERNAME=${TEST_USERNAME?}" >> "$GITHUB_OUTPUT"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}" >> "$GITHUB_OUTPUT"

      - name: Provision test user
        run: npm run users:provision '${{ needs.deploy-provider.outputs.users-table }}' '${{ steps.uuid.outputs.TEST_USERNAME }}' '${{ steps.uuid.outputs.TEST_PASSWORD }}'

      - name: Install dependencies and Playwright browsers
        run: |
          npm -v
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Run Playwright behaviour tests
        run: |
          npm run test:web --project=chromium
        env:
          BASE_URL: ${{ needs.deploy-provider.outputs.base-url }}
          TEST_USERNAME: ${{ steps.uuid.outputs.TEST_USERNAME }}
          TEST_PASSWORD: ${{ steps.uuid.outputs.TEST_PASSWORD }}

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: web-test-artifacts
          path: |
            playwright-report
            test-results

  load-test:
    needs:
      - names
      - deploy-observability
      - deploy-dev
      - deploy-provider
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'ci' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-oidc-deploy

      - name: Create test username and a test password
        id: uuid
        run: |
          TEST_USERNAME=$(uuidgen | tr '[:upper:]' '[:lower:]')
          TEST_PASSWORD=$(uuidgen | tr '[:upper:]' '[:lower:]')
          echo "TEST_USERNAME=${TEST_USERNAME?}"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}"
          echo "TEST_USERNAME=${TEST_USERNAME?}" >> "$GITHUB_OUTPUT"
          echo "TEST_PASSWORD=${TEST_PASSWORD?}" >> "$GITHUB_OUTPUT"

      - name: Provision test user
        run: npm run users:provision '${{ needs.deploy-provider.outputs.users-table }}' '${{ steps.uuid.outputs.TEST_USERNAME }}' '${{ steps.uuid.outputs.TEST_PASSWORD }}'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 load test (5 minutes)
        run: |
          k6 run tests/load.live.test.js --summary-export=load-test-summary.json
        env:
          BASE_URL: ${{ needs.deploy-provider.outputs.base-url }}
          TEST_USERNAME: ${{ steps.uuid.outputs.TEST_USERNAME }}
          TEST_PASSWORD: ${{ steps.uuid.outputs.TEST_PASSWORD }}

      - name: Upload artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: load-test-artifacts
          path: |
            load-test-summary.json
