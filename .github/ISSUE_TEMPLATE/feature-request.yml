name: Feature Request
description: Suggest a new feature or enhancement for the OIDC Provider
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please provide detailed information about your proposal.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please verify you've completed these steps before submitting
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have read the [project README](../../README.md) and [contributing guidelines](../../CONTRIBUTING.md)
          required: true
        - label: This feature aligns with the project's goals and scope
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What type of feature is this?
      options:
        - Authentication/Authorization
        - API Enhancement
        - Performance Improvement
        - Security Enhancement
        - Developer Experience
        - Documentation
        - Infrastructure/Deployment
        - Integration
        - Other
      default: 0
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the current limitation?
      placeholder: "As a [user type], I need [functionality] so that [benefit/value]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution in detail
      placeholder: |
        - How should this feature work?
        - What new endpoints, configuration, or behavior should be added?
        - How should users interact with this feature?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: What other approaches have you considered?
      placeholder: Describe any alternative solutions or workarounds you've considered

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Provide specific examples of how this feature would be used
      placeholder: |
        1. Use case 1: [scenario]
        2. Use case 2: [scenario]
        3. Use case 3: [scenario]
    validations:
      required: true

  - type: textarea
    id: technical-details
    attributes:
      label: Technical Implementation Details
      description: If you have ideas about implementation, please share them
      placeholder: |
        - API changes needed
        - Configuration changes
        - Database schema changes
        - Security considerations
        - Performance implications

  - type: dropdown
    id: breaking-changes
    attributes:
      label: Breaking Changes
      description: Would this feature require breaking changes?
      options:
        - "No - Fully backward compatible"
        - "Minor - Some optional configuration changes"
        - "Major - Requires migration or significant changes"
        - "Unsure"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to you?
      options:
        - Critical - Blocking my project
        - High - Very important for my use case
        - Medium - Would be nice to have
        - Low - Minor improvement
      default: 1
    validations:
      required: true

  - type: textarea
    id: oauth-compliance
    attributes:
      label: OAuth/OIDC Compliance
      description: How does this feature relate to OAuth 2.0 or OpenID Connect specifications?
      placeholder: |
        - Which RFC or specification does this relate to?
        - Is this a standard OAuth/OIDC feature or extension?
        - Are there compliance considerations?

  - type: textarea
    id: testing
    attributes:
      label: Testing Considerations
      description: How should this feature be tested?
      placeholder: |
        - Unit tests needed
        - Integration tests needed
        - E2E scenarios to cover
        - Security tests required

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      description: Are you willing to help implement this feature?
      options:
        - label: I am willing to submit a pull request to implement this feature
        - label: I can help with testing the implementation
        - label: I can help with documentation

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples that would help understand this feature
      placeholder: Links to similar implementations, mockups, or detailed examples