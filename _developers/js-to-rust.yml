# .github/workflows/js-to-rust.yml
name: js-to-rust

on:
  workflow_dispatch:
  #push:
  #  branches: ['**']

env:
  NODE_VERSION: "22"
  RUST_PORT_MAX_ATTEMPTS: "5"
  NODE_BASE_URL: "http://127.0.0.1:3000"
  RUST_BASE_URL: "http://127.0.0.1:3001"
  COLLECTION: "./postman/collection.json" # change path as needed
  ENV_FILE: "./postman/environment.json" # optional: remove if unused

jobs:
  test-and-port:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

      - name: Start Node server
        run: |
          npm run start &
          echo $! > node_server.pid
      - name: Wait for Node server
        run: |
          npx --yes wait-on ${{ env.NODE_BASE_URL }} || npx --yes wait-on tcp:3000

      - name: Newman on Node
        uses: postmanlabs/newman-action@v6
        with:
          collection: ${{ env.COLLECTION }}
          environment: ${{ env.ENV_FILE }}
          reporters: cli
          envVar: |
            baseUrl=${{ env.NODE_BASE_URL }}

      - name: Stop Node server
        if: always()
        run: |
          if [ -f node_server.pid ]; then kill $(cat node_server.pid) || true; fi

      # ---------- Port & verify loop ----------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CLIs for loop
        run: |
          npm i -g @openai/codex newman wait-on

      - name: Port to Rust and loop Newman until green
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          # Ensure a Rust workspace dir exists; Codex may generate if absent.
          mkdir -p server-rust

          attempt=1
          pass=0
          while [ "$attempt" -le "${RUST_PORT_MAX_ATTEMPTS}" ]; do
            echo "Attempt $attempt/${RUST_PORT_MAX_ATTEMPTS}"

            # Ask Codex to port/iterate. Non-interactive run with explicit goal.
            codex run \
              --non-interactive \
              --goal 'Port the Express REST API to Rust using axum. Preserve routes, status codes, JSON shapes, and errors. Place code in ./server-rust. Add Cargo workspace, tokio, axum, serde, tracing. Mirror .env config. Keep OpenAPI if present. Update tests.' \
              --plan 'Read ./src ./routes ./middleware and package.json. Generate ./server-rust with main, routes, middleware layers, and config. Provide instructions in codex.md. Do not remove Node app.' \
              --execute 'echo planning complete'

            # Build Rust
            if [ -f server-rust/Cargo.toml ]; then
              (cd server-rust && cargo build --locked)
            else
              echo 'Rust workspace not found; continuing iteration.'
            fi

            # Start Rust server if present
            if [ -f server-rust/Cargo.toml ]; then
              (cd server-rust && cargo run &) >/dev/null 2>&1
              RPID=$!
              # Wait for port or HTTP
              npx wait-on "${RUST_BASE_URL}" || npx wait-on tcp:3001 || true
            else
              RPID=
            fi

            # Run Newman against Rust base
            set +e
            newman run "${COLLECTION}" \
              ${ENV_FILE:+--environment "${ENV_FILE}"} \
              --reporters cli \
              --env-var baseUrl="${RUST_BASE_URL}"
            status=$?
            set -e

            # Stop Rust server if started
            if [ -n "${RPID}" ]; then kill "${RPID}" || true; fi

            if [ "$status" -eq 0 ]; then
              echo 'Rust implementation passed Newman.'
              pass=1
              break
            fi

            echo 'Newman failed on Rust. Feeding failure back to Codex and retrying.'
            # Provide failure signal to Codex to iterate again
            codex run \
              --non-interactive \
              --goal 'Fix the Rust server so that the Newman API tests pass. Keep behavior identical to the Node implementation.' \
              --execute 'echo iterate'

            attempt=$((attempt+1))
          done

          if [ "$pass" -ne 1 ]; then
            echo "Reached ${RUST_PORT_MAX_ATTEMPTS} attempts without a passing Rust build."
            exit 1
          fi
